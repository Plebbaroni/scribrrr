# fly launch  (from repo root — uses Dockerfile)
# fly secrets set SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=... SONIOX_API_KEY= ...
# Do NOT set PORT as a secret — fly.toml internal_port sets it. A stale PORT=3001 breaks deploy.
# fly deploy

app = "scribrrr"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  FRONTEND_URL = "https://scribrrr.vercel.app"
  BACKEND_URL = "https://scribrrr.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
